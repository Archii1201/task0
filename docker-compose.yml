version: "3.8"

services:
  db:
    image: postgres:15-alpine
    container_name: taskdb
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpass123
      POSTGRES_DB: taskdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: taskapi
    environment:
      DATABASE_URL: postgresql://taskuser:taskpass123@db:5432/taskdb
      DEBUG: "False"
      ENVIRONMENT: production
      SECRET_KEY: your-production-secret-key-change-this
      CORS_ORIGINS: '["http://localhost:3000", "http://localhost:8000"]'
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:18-alpine
    container_name: taskfrontend
    working_dir: /app
    environment:
      REACT_APP_API_URL: http://localhost:8000/api/v1
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    command: sh -c "npm install && npm start"

volumes:
  postgres_data:
  frontend_node_modules:

networks:
  default:
    name: taskapp-network
